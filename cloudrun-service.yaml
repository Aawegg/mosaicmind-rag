# Cloud Run service definition.
# Used by: gcloud run services replace cloudrun-service.yaml --region=$REGION
# Env vars / secrets are injected separately by deploy_cloudrun.sh / GH Actions.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: mosaicmind
  annotations:
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        # Allow up to 10 concurrent requests per instance.
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
        run.googleapis.com/cpu-throttling: "false"
    spec:
      timeoutSeconds: 300
      containerConcurrency: 10
      containers:
        - image: PLACEHOLDER_IMAGE
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "2"
              memory: 4Gi
          env:
            - name: MOSAIC_DATA_DIR
              value: /app/data
            - name: MOSAIC_UPLOAD_DIR
              value: /app/data/uploads
            - name: MOSAIC_INDEX_DIR
              value: /app/data/index
            - name: MOSAIC_CHROMA_DIR
              value: /app/data/chroma
            - name: MLFLOW_TRACKING_URI
              value: /app/data/mlruns
